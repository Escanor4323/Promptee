version: "3.8"

services:
  # PostgreSQL Relational Database (for templates, executions, feedback, metrics)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-promptee}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-promptee_password}
      POSTGRES_DB: ${PG_DATABASE:-promptee}
    ports:
      - "${PG_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-promptee}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - promptee_net

  # etcd (Milvus dependency)
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 5s
    networks:
      - promptee_net

  # MinIO (Milvus dependency)
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - promptee_net

  # Milvus Vector Database (for embeddings and semantic search)
  milvus:
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - promptee_net

  # FastAPI Backend Service (Promptee API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-promptee}
      - PG_PASSWORD=${PG_PASSWORD:-promptee_password}
      - PG_DATABASE=${PG_DATABASE:-promptee}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - promptee_net

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  promptee_net:
    driver: bridge
